[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nginx", "nodejs_22"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install && npm run build"
]

[start]
# Eliminamos el "node /assets/scripts/pre-start.sh" que sobraba
cmd = "php-fpm -D && nginx -g 'daemon off;'"
